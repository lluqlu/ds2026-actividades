<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
    <div class="contenedor">
        <h1>Currículum Vitae</h1>
        <h2>Contacto</h2>
        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="estudios.html">Estudios</a>
            <a href="experiencia.html">Experiencia</a>
            <a href="hobbies.html">Hobbies</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </div>
</header>

<main class="contenedor">
    <section class="tarjeta">
        <h3>Formulario de contacto</h3>

        <form class="formulario">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="email@ejemplo.com" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribí tu mensaje"></textarea>

            <button type="submit">Enviar</button>
        </form>
    </section>
</main>

<footer class="site-footer">
    <p>&copy; 2026 Lautaro Luque</p>
</footer>

</body>
</html>
